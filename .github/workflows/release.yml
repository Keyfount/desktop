name: Release

# A release is cut when a pull request is merged into `main` (normally the
# develop -> main PR). The PR must carry exactly one `release:` label, which
# decides the version bump; the PR body becomes the GitHub Release notes.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve version bump from the PR label
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          level=$(printf '%s' "$LABELS" | jq -r '.[]' | grep -E '^release:(major|minor|patch)$' | sed 's/release://' || true)
          count=$(printf '%s' "$level" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "::error::Exactly one release label is required on the PR (release:major | release:minor | release:patch). Found: [${level//$'\n'/, }]"
            exit 1
          fi
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "Bump level: $level"

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          latest=${latest:-v0.0.0}
          ver=${latest#v}
          major=$(echo "$ver" | cut -d. -f1)
          minor=$(echo "$ver" | cut -d. -f2)
          patch=$(echo "$ver" | cut -d. -f3)
          case "${{ steps.bump.outputs.level }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "version=${new}" >> "$GITHUB_OUTPUT"
          echo "tag=v${new}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${latest} -> v${new}"

  verify:
    name: Verify
    needs: prepare
    uses: ./.github/workflows/verify.yml
    with:
      ref: main

  release:
    name: Build & publish (macOS Universal)
    needs: [prepare, verify]
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install npm dependencies
        run: npm ci

      - name: Stamp release version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node -e "const fs=require('fs'),f='src-tauri/tauri.conf.json',j=JSON.parse(fs.readFileSync(f,'utf8'));j.version=process.env.VERSION;fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          perl -pi -e 'if(!$d && s/^version = "[^"]*"/version = "'"$VERSION"'"/){$d=1}' src-tauri/Cargo.toml

      - name: Compose release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          # Release notes = the PR description, then an auto-generated changelog
          # of the PRs merged since the previous tag.
          gen=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" -f target_commitish=main --jq '.body')
          {
            echo "RELEASE_NOTES<<KF_NOTES_EOF"
            printf '%s\n\n' "$PR_BODY"
            printf '%s\n' "$gen"
            echo "KF_NOTES_EOF"
          } >> "$GITHUB_ENV"

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          # Unsigned build: no Tauri updater signing, no Apple code-signing or
          # notarisation. The token lets tauri-action publish the release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Keyfount Desktop ${{ needs.prepare.outputs.tag }}"
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: false
          prerelease: false
