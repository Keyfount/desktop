  #       uses: actions/cache@v4
  #       with:
  #         path: |
  #           ~/.cargo/registry
  #           ~/.cargo/git
  #           src-tauri/target
  #         key: cargo-windows-bundle-${{ hashFiles('src-tauri/Cargo.lock') }}
  #         restore-keys: |
