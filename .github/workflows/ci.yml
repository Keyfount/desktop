name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, typecheck, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14

  rust:
    name: Rust (fmt, clippy, test, golden vectors)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libxdo-dev

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: cargo test (incl. golden vectors)
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

  frontend-build:
    name: Build frontend
    needs: [frontend, rust]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # Native Tauri builds (DMG/MSIX/AppImage) run in the release workflow
  # for signed/notarised artefacts. The job below ships an UNSIGNED DMG
  # for every CI run so a contributor can `Download artefact` from the
  # PR and try the build immediately — no waiting for a tagged release.
  bundle-macos:
    name: Bundle macOS DMG (unsigned)
    needs: [frontend, rust]
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Rust (aarch64 + x86_64 targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-bundle-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-macos-bundle-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundle
        # No signing env vars on purpose — the artefact is "unsigned, for
        # testing only". macOS Gatekeeper will warn the user; that's
        # expected for a CI-built dev preview. The release workflow is
        # the one that produces signed + notarised .dmg files.
        run: npm run build:tauri -- --target aarch64-apple-darwin

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: keyfount-macos-aarch64-${{ github.sha }}
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 14
          if-no-files-found: error

      - name: Upload .app (raw bundle)
        uses: actions/upload-artifact@v4
        with:
          name: keyfount-macos-app-${{ github.sha }}
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          retention-days: 14
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Windows bundle (.msi / .exe) — commented out for now.
  #
  # The Touch ID / Windows Hello backend has only ever been wired up
  # for macOS so far (the `windows.rs` biometric module is a stub),
  # and the maintainer has no Windows machine to test the artefact on.
  # Uncomment when the Windows Hello path is implemented and we can
  # actually verify the produced installer boots a vault.
