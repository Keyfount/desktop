name: CI

# Gates every pull request into develop and main, plus direct pushes to
# develop. Feature branches merge into develop; develop merges into main to
# cut a release (release.yml). The actual checks live in verify.yml, which the
# release workflow reuses so the same green bar gates both CI and releases.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
