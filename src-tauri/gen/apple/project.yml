name: keyfount
options:
  bundleIdPrefix: io.keyfount.desktop
  deploymentTarget:
    # iOS 15 unlocks `UIButton.Configuration`, `UIAction` everywhere
    # (already needed for our AutoFill extension), and the inset-grouped
    # search-bar treatment. iOS 15 is from 2021 — every supported iPhone
    # is on >= iOS 15.
    iOS: "15.0"
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Keyfount
      PRODUCT_BUNDLE_IDENTIFIER: io.keyfount.desktop
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]

aggregateTargets:
  RustCore:
    buildScripts:
      - script: npm run -- tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:-}" --header-search-paths "${HEADER_SEARCH_PATHS:-}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a

targets:
  keyfount_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: keyfount_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: keyfount_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
    entitlements:
      path: keyfount_iOS/keyfount_iOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.keyfount.app
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.keyfount.shared
        com.apple.developer.authentication-services.autofill-credential-provider: true
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: "0.1.0"
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - target: RustCore
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      - target: AutofillExtension
        embed: true

  AutofillExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: AutofillExtension
    info:
      path: AutofillExtension/Info.plist
      properties:
        CFBundleDisplayName: Keyfount
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.authentication-services-credential-provider-ui
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).CredentialProviderViewController
    entitlements:
      path: AutofillExtension/AutofillExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.keyfount.app
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.keyfount.shared
        com.apple.developer.authentication-services.autofill-credential-provider: true
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: "0.1.0"
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        PRODUCT_BUNDLE_IDENTIFIER: io.keyfount.desktop.AutofillExtension
    dependencies:
      - target: RustCore
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: LocalAuthentication.framework
      - sdk: AuthenticationServices.framework